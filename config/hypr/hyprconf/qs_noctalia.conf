env = UI_ENV,qs_noctalia
env = QT_QPA_PLATFORMTHEME,qt6ct

exec-once = qs -c noctalia-shell 
exec-once = pkill hyprpaper
exec-once = pkill vicinae-server
exec-once = pkill hypridle
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
